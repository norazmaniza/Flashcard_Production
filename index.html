<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAND Experiment Flashcards</title>
    <style>
        :root {
            --primary-color: #0ea5e9;
            --primary-hover: #0284c7;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 580px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: #0f172a;
            text-align: center;
        }

        .flashcard-wrapper {
            width: 100%;
            height: 340px;
            perspective: 1000px;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow);
            border-radius: 16px;
        }

        .flashcard.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            background-color: var(--card-bg);
            padding: 36px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .card-label {
            position: absolute;
            top: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            background-color: #f1f5f9;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .card-text {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.5;
            word-wrap: break-word;
            max-width: 100%;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: #fafafa;
            border-left: 6px solid var(--primary-color);
        }

        .card-back .card-text {
            font-weight: 400;
            font-size: 1.1rem;
            line-height: 1.6;
            text-align: left;
        }

        .hint-text {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .controls-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background-color: #e2e8f0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        .nav-controls {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid #cbd5e1;
            padding: 10px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            user-select: none;
        }

        .btn:hover:not(:disabled) { background-color: #f1f5f9; border-color: #94a3b8; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background-color: var(--primary-color); color: white; border: none; }
        .btn-primary:hover:not(:disabled) { background-color: var(--primary-hover); }
        .progress-text { font-size: 0.9rem; font-weight: 600; color: var(--text-muted); }

        .shortcuts {
            margin-top: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
        }

        .key {
            background: #e2e8f0;
            border-radius: 4px;
            padding: 2px 6px;
            font-family: monospace;
            font-weight: bold;
        }

        @media (max-width: 480px) {
            header h1 { font-size: 1.4rem; }
            .flashcard-wrapper { height: 360px; }
            .card-text { font-size: 1.15rem; }
            .card-back .card-text { font-size: 1.05rem; }
            .btn { padding: 8px 16px; font-size: 0.85rem; }
            .shortcuts { display: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>RAND Experiment Study Tool</h1>
        </header>

        <div class="flashcard-wrapper" id="cardWrapper" onclick="flipCard()">
            <div class="flashcard" id="flashcard">
                <div class="card-face card-front">
                    <span class="card-label">Question</span>
                    <p class="card-text" id="questionText">Loading...</p>
                    <span class="hint-text">Click to reveal answer</span>
                </div>
                <div class="card-face card-back">
                    <span class="card-label">Answer</span>
                    <p class="card-text" id="answerText">Loading...</p>
                    <span class="hint-text">Click to see question</span>
                </div>
            </div>
        </div>

        <div class="controls-container">
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <div class="nav-controls">
                <button class="btn" id="prevBtn" onclick="prevCard()" disabled>&larr; Previous</button>
                <span class="progress-text" id="progressText">0 of 0</span>
                <button class="btn btn-primary" id="nextBtn" onclick="nextCard()">Next &rarr;</button>
            </div>
        </div>

        <div class="shortcuts">
            Tip: Press <span class="key">Space</span> to flip, <span class="key">&larr;</span> for previous, <span class="key">&rarr;</span> for next.
        </div>
    </div>

    <script>
        // Data directly integrated safely to prevent any loading issues
        const flashcards = [
            {
                "question": "What does an income elasticity of > 1 (e.g., 1.6) indicate about medical care?",
                "answer": "It indicates that medical care is a superior or luxury good at the aggregate level, meaning as people get richer, they spend a disproportionately higher percentage of their wealth on health [1]."
            },
            {
                "question": "What is the overall price elasticity of medical care, and what does it mean?",
                "answer": "The overall price elasticity is roughly -0.2 (inelastic), meaning a 10% increase in out-of-pocket costs only reduces demand by 2% [1]."
            },
            {
                "question": "What were the main questions the RAND Health Insurance Experiment sought to answer?",
                "answer": "The experiment asked whether higher cost-sharing reduces medical spending, and more importantly, whether it ruins health [1]."
            },
            {
                "question": "According to the RAND Experiment, which type of medical service is the most inelastic (urgently needed regardless of price)?",
                "answer": "Inpatient hospital services are highly inelastic, with a price elasticity of -0.1 [1]."
            },
            {
                "question": "According to the RAND Experiment, which type of medical service is highly elastic?",
                "answer": "Dental services are highly elastic (-0.4), meaning patients are highly likely to defer dental care if out-of-pocket costs rise [1]."
            },
            {
                "question": "Why is cost-sharing considered a 'blunt instrument' according to the RAND Experiment?",
                "answer": "Because patients lack the medical expertise to separate necessary from unnecessary care, higher cost-sharing reduced both appropriate and inappropriate care in roughly equal proportions [1]."
            },
            {
                "question": "How did high cost-sharing affect the health outcomes of the average, relatively healthy person in the RAND Experiment?",
                "answer": "There was no significant difference in health outcomes; for the average person, cost-sharing was purely a financial issue, not a health issue [1]."
            },
            {
                "question": "How did cost-sharing affect vulnerable (poorest and sickest) populations in the RAND Experiment?",
                "answer": "It acted as a dangerous barrier to essential care, leading to worse health outcomes, whereas free care led to significant improvements like better-controlled hypertension and better dental health [1]."
            }
        ];

        let currentIndex = 0;

        const flashcardEl = document.getElementById('flashcard');
        const questionTextEl = document.getElementById('questionText');
        const answerTextEl = document.getElementById('answerText');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressTextEl = document.getElementById('progressText');
        const progressBarEl = document.getElementById('progressBar');

        function updateCard() {
            if (flashcardEl.classList.contains('flipped')) {
                flashcardEl.classList.remove('flipped');
                setTimeout(renderContent, 200);
            } else {
                renderContent();
            }
        }

        function renderContent() {
            if (flashcards.length === 0) return;
            
            const currentCard = flashcards[currentIndex];
            questionTextEl.textContent = currentCard.question;
            answerTextEl.textContent = currentCard.answer;
            
            progressTextEl.textContent = `Card ${currentIndex + 1} of ${flashcards.length}`;
            progressBarEl.style.width = `${((currentIndex + 1) / flashcards.length) * 100}%`;
            
            prevBtn.disabled = currentIndex === 0;
            nextBtn.textContent = currentIndex === flashcards.length - 1 ? "Restart ↺" : "Next →";
        }

        function flipCard() { flashcardEl.classList.toggle('flipped'); }

        function nextCard() {
            if (currentIndex < flashcards.length - 1) currentIndex++;
            else currentIndex = 0;
            updateCard();
        }

        function prevCard() {
            if (currentIndex > 0) { currentIndex--; updateCard(); }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); flipCard(); }
            else if (e.code === 'ArrowRight') nextCard();
            else if (e.code === 'ArrowLeft') prevCard();
        });

        // Bootstrap on startup
        renderContent();
    </script>
</body>
</html>
